<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMART PARTS IMPORT - Peças Premium para Caminhões e Carretas</title>
    <style>
      /* Skip-to-content: invisível até focar via teclado */
      .skip-to-content {
        position: absolute;
        top: -100%;
        left: 1rem;
        z-index: 9999;
        padding: 0.5rem 1rem;
        background: #dc2626;
        color: white;
        font-weight: bold;
        border-radius: 0 0 0.5rem 0.5rem;
        text-decoration: none;
        transition: top 0.2s;
      }
      .skip-to-content:focus {
        top: 0;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-to-content">Pular para o conteúdo</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
